version: '3.8'
services:
  price-craft-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_BUILD_TARGET:-production}
    ports:
      - '${DOCKER_PROD_PORT:-4000}:${PORT:-4000}'
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'curl', '-f', 'http://localhost:${PORT:-4000}/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
